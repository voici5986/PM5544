    :root {
      --bg: #111;
      --panel: #1c1c1c;
      --frame: #2a2a2a;
      --text: #e6e6e6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #2b2b2b 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "VT323 Embedded", monospace;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .app {
      width: min(1600px, 100%);
      height: 100%;
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(640px, 1fr);
      gap: 14px;
      min-height: 0;
    }

    .stage {
      grid-column: 2;
      grid-row: 1;
      background: linear-gradient(180deg, var(--panel), #101010);
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
      position: relative;
      min-width: 0;
      min-height: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewport {
      position: relative;
      display: inline-block;
    }

    canvas {
      display: block;
      border: 2px solid var(--frame);
      background: #000;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tc-bar {
      position: absolute;
      background: #000;
      text-align: center;
      margin: auto;
      left: 0;
      right: 0;
      display: none;
      color: #fff;
      line-height: 0.8;
      text-transform: uppercase;
      font-family: "VT323 Embedded", monospace;
    }

    .tc-bar p {
      margin: 0;
      font-size: 4.5vw;
      transform: scaleX(1.5);
      transform-origin: center;
      white-space: nowrap;
    }

    .tc-bar.top-large {
      width: 14%;
      top: 9.5%;
    }

    .tc-bar.top-small {
      width: 14%;
      top: 9.5%;
      line-height: 1;
    }

    .tc-bar.top-small p {
      font-size: 2.25vw;
    }

    .tc-bar.top-small p + p {
      margin-top: 0.2em;
    }

    .tc-bar.bottom-right {
      width: 19.2%;
      top: 76.7%;
      left: 2.2%;
      right: auto;
      margin: 0;
    }

    .tc-bar.bottom-full {
      width: 23.8%;
      top: 76.3%;
      padding: 0.3% 0;
    }

    @media (min-width: 900px) {
      .tc-bar p {
        font-size: 40px;
      }

      .tc-bar.top-small p {
        font-size: 20px;
      }

      .tc-bar.top-small p + p {
        margin-top: 4px;
      }
    }

    .control-panel {
      grid-column: 1;
      grid-row: 1;
      width: 100%;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      background: linear-gradient(180deg, #1f1f1f, #141414);
      padding: 12px;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.28);
      align-self: stretch;
      max-height: 100%;
      overflow-y: auto;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(130px, 1fr));
      gap: 8px;
    }

    .control-grid.top-grid {
      grid-template-columns: repeat(3, minmax(100px, 1fr));
    }

    .control-grid.bottom-grid {
      grid-template-columns: repeat(2, minmax(130px, 1fr));
      margin-top: 10px;
    }

    .control-grid label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 16px;
      color: #d2d2d2;
      letter-spacing: 0.02em;
    }

    .control-grid input {
      height: 34px;
      border: 1px solid #4a4a4a;
      border-radius: 7px;
      background: #0f0f0f;
      color: #f0f0f0;
      padding: 0 10px;
      font: 500 16px "VT323 Embedded", monospace;
    }

    .control-note {
      margin-top: 8px;
      font-size: 14px;
      color: #adadad;
    }

    .control-section-title {
      margin: 8px 0 6px;
      font-size: 16px;
      letter-spacing: 0.03em;
      color: #d8d8d8;
    }

    .control-actions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .control-actions button {
      height: 34px;
      border: 1px solid #4a4a4a;
      border-radius: 7px;
      background: #202020;
      color: #f2f2f2;
      padding: 0 12px;
      font: 600 16px "VT323 Embedded", monospace;
      cursor: pointer;
    }

    .control-actions button:hover {
      background: #2a2a2a;
    }

    @media (max-width: 1180px) {
      body {
        align-items: flex-start;
        overflow: auto;
      }

      .app {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .stage {
        grid-column: 1;
        grid-row: 1;
        height: auto;
        min-height: 54vh;
      }

      .control-panel {
        grid-column: 1;
        grid-row: 2;
        max-height: none;
      }
    }

    @media (max-width: 680px) {
      .control-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stage">
      <div class="viewport">
        <canvas id="pm5544"></canvas>
        <div class="overlay" id="overlay">
          <div class="tc-bar top-large" id="tbarlarge"><p id="tbar"></p></div>
          <div class="tc-bar top-small" id="tbarsmall">
            <p id="tbar1"></p>
            <p id="tbar2"></p>
          </div>
          <div class="tc-bar bottom-right" id="bbar-right"><p id="bbar"></p></div>
          <div class="tc-bar bottom-full" id="bbar-full"><p id="bbarfull"></p></div>
        </div>
      </div>
    </div>
    <section class="control-panel" aria-label="PM5544 参数面板">
      <div class="control-section-title">顶部栏参数</div>
      <div class="control-grid top-grid">
        <label for="param-tbar">tbar
          <input id="param-tbar" type="text" placeholder="例: TIME 或 STATION" />
        </label>
        <label for="param-tbar1">tbar1
          <input id="param-tbar1" type="text" placeholder="例: PM5544" />
        </label>
        <label for="param-tbar2">tbar2
          <input id="param-tbar2" type="text" placeholder="例: DATE" />
        </label>
      </div>
      <div class="control-note">`tbar` = 大字单行顶栏；`tbar1/tbar2` = 双行小字顶栏。</div>
      <div class="control-note">`tbar` 覆盖 `tbar1/tbar2`</div>

      <div class="control-section-title">底部栏参数</div>
      <div class="control-grid bottom-grid">
        <label for="param-bbar">bbar
          <input id="param-bbar" type="text" placeholder="例: DATE" />
        </label>
        <label for="param-bbarfull">bbarfull
          <input id="param-bbarfull" type="text" placeholder="例: NO SIGNAL" />
        </label>
      </div>
      <div class="control-note">`bbar` = 左下小栏；`bbarfull` = 底部中间全宽栏。</div>
      <div class="control-note">`TIME`/`DATE` 写在哪个参数里，就会显示在对应栏位并自动更新。</div>
      <div class="control-actions">
        <button id="btn-apply" type="button">应用并更新 URL</button>
        <button id="btn-reset" type="button">清空参数</button>
        <button id="btn-copy-url" type="button">更新并复制 URL</button>
        <button id="btn-export-svg" type="button">导出 SVG</button>
        <button id="btn-export-html" type="button">导出 HTML</button>
      </div>
    </section>
  </div>

  <script>
    const MIN_WIDTH = 1024;

    const EMBEDDED_VT323_WOFF2_DATA_URL = "data:font/woff2;base64," + EMBEDDED_VT323_WOFF2_BASE64;

    const stageElement = document.querySelector(".stage");
    const canvas = document.getElementById("pm5544");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const tbarLarge = document.getElementById("tbarlarge");
    const tbarSmall = document.getElementById("tbarsmall");
    const bbarRight = document.getElementById("bbar-right");
    const bbarFull = document.getElementById("bbar-full");
    const tbar = document.getElementById("tbar");
    const tbar1 = document.getElementById("tbar1");
    const tbar2 = document.getElementById("tbar2");
    const bbar = document.getElementById("bbar");
    const bbarfull = document.getElementById("bbarfull");
    const paramInputs = {
      tbar: document.getElementById("param-tbar"),
      tbar1: document.getElementById("param-tbar1"),
      tbar2: document.getElementById("param-tbar2"),
      bbar: document.getElementById("param-bbar"),
      bbarfull: document.getElementById("param-bbarfull")
    };
    const btnApply = document.getElementById("btn-apply");
    const btnReset = document.getElementById("btn-reset");
    const btnCopyUrl = document.getElementById("btn-copy-url");
    const btnExportSvg = document.getElementById("btn-export-svg");
    const btnExportHtml = document.getElementById("btn-export-html");

    const cardImage = new Image();
    let isCardReady = false;
    let hasCardError = false;
    const wkdays = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
    const mnths = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    const clockTargets = new Set();
    const dateTargets = new Set();
    let clockTimerId = null;
    let dateTimerId = null;

    function setBarVisible(element, visible) {
      element.style.display = visible ? "block" : "none";
    }

    function formatClock(now) {
      const s = String(now.getSeconds()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const h = String(now.getHours()).padStart(2, "0");
      return `${h}:${m}:${s}`;
    }

    function formatDate(now) {
      const w = wkdays[now.getDay()];
      const d = String(now.getDate()).padStart(2, "0");
      const m = mnths[now.getMonth()];
      return `${w} ${d} ${m}`;
    }

    function updateClockTargets() {
      const clockText = formatClock(new Date());
      clockTargets.forEach((el) => {
        el.textContent = clockText;
      });
    }

    function updateDateTargets() {
      const dateText = formatDate(new Date());
      dateTargets.forEach((el) => {
        el.textContent = dateText;
      });
    }

    function syncTimers() {
      if (clockTargets.size === 0 && clockTimerId !== null) {
        clearInterval(clockTimerId);
        clockTimerId = null;
      } else if (clockTargets.size > 0 && clockTimerId === null) {
        updateClockTargets();
        clockTimerId = setInterval(updateClockTargets, 1000);
      }

      if (dateTargets.size === 0 && dateTimerId !== null) {
        clearInterval(dateTimerId);
        dateTimerId = null;
      } else if (dateTargets.size > 0 && dateTimerId === null) {
        updateDateTargets();
        dateTimerId = setInterval(updateDateTargets, 1000);
      }
    }

    function bindBarValue(targetElement, rawValue) {
      const value = rawValue ?? "";
      const token = value.trim().toUpperCase();

      if (token === "TIME") {
        clockTargets.add(targetElement);
        return;
      }

      if (token === "DATE") {
        dateTargets.add(targetElement);
        return;
      }

      targetElement.textContent = value;
    }

    function resetBars() {
      setBarVisible(tbarLarge, false);
      setBarVisible(tbarSmall, false);
      setBarVisible(bbarRight, false);
      setBarVisible(bbarFull, false);

      [tbar, tbar1, tbar2, bbar, bbarfull].forEach((el) => {
        el.textContent = "";
        clockTargets.delete(el);
        dateTargets.delete(el);
      });
    }

    function applyTextBarParams(urlParams = new URLSearchParams(window.location.search)) {
      resetBars();

      if (urlParams.has("tbar")) {
        setBarVisible(tbarLarge, true);
        bindBarValue(tbar, urlParams.get("tbar"));
      } else {
        let hasTopSmall = false;

        if (urlParams.has("tbar1")) {
          hasTopSmall = true;
          bindBarValue(tbar1, urlParams.get("tbar1"));
        }

        if (urlParams.has("tbar2")) {
          hasTopSmall = true;
          bindBarValue(tbar2, urlParams.get("tbar2"));
        }

        setBarVisible(tbarSmall, hasTopSmall);
      }

      if (urlParams.has("bbar")) {
        setBarVisible(bbarRight, true);
        bindBarValue(bbar, urlParams.get("bbar"));
      }
      if (urlParams.has("bbarfull")) {
        setBarVisible(bbarFull, true);
        bindBarValue(bbarfull, urlParams.get("bbarfull"));
      }

      syncTimers();
    }

    function getParamsFromInputs() {
      const params = new URLSearchParams();
      Object.entries(paramInputs).forEach(([key, input]) => {
        const value = input.value.trim();
        if (value !== "") {
          params.set(key, value);
        }
      });
      return params;
    }

    function setInputsFromParams(params) {
      Object.entries(paramInputs).forEach(([key, input]) => {
        input.value = params.get(key) ?? "";
      });
    }

    function updateUrlFromParams(params) {
      const query = params.toString();
      const nextUrl = query ? `${window.location.pathname}?${query}` : window.location.pathname;
      window.history.replaceState(null, "", nextUrl);
    }

    function resolveDynamicValue(rawValue) {
      const value = rawValue ?? "";
      const token = value.trim().toUpperCase();

      if (token === "TIME") {
        return formatClock(new Date());
      }

      if (token === "DATE") {
        return formatDate(new Date());
      }

      return value;
    }

    function toDisplayText(rawValue) {
      return resolveDynamicValue(rawValue).toUpperCase();
    }

    function getRenderValues(params) {
      const values = {
        topLarge: "",
        top1: "",
        top2: "",
        bottomRight: "",
        bottomFull: ""
      };

      if (params.has("tbar")) {
        values.topLarge = toDisplayText(params.get("tbar"));
      } else {
        if (params.has("tbar1")) {
          values.top1 = toDisplayText(params.get("tbar1"));
        }
        if (params.has("tbar2")) {
          values.top2 = toDisplayText(params.get("tbar2"));
        }
      }

      if (params.has("bbar")) {
        values.bottomRight = toDisplayText(params.get("bbar"));
      }
      if (params.has("bbarfull")) {
        values.bottomFull = toDisplayText(params.get("bbarfull"));
      }

      return values;
    }

    function escapeXml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&apos;");
    }

    function downloadTextFile(filename, text, mimeType) {
      const blob = new Blob([text], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    let cachedEmbeddedFontDataUrl = null;

    async function getEmbeddedFontDataUrl() {
      if (cachedEmbeddedFontDataUrl === null) {
        cachedEmbeddedFontDataUrl = EMBEDDED_VT323_WOFF2_DATA_URL;
      }

      return cachedEmbeddedFontDataUrl;
    }

    function buildCustomSvg(params, embeddedFontDataUrl = "") {
      const width = 1920;
      const height = 1440;
      const render = getRenderValues(params);

      const topBarWidth = width * 0.14;
      const topBarX = (width - topBarWidth) / 2;
      const topBarY = height * 0.095;
      const topBarH = 44;
      const topSmallLine1Y = topBarY + 12;
      const topSmallLine2Y = topBarY + 33;

      const bottomRightW = width * 0.192;
      const bottomRightX = width * 0.022;
      const bottomRightY = height * 0.767;
      const bottomRightH = 34;

      const bottomFullW = width * 0.238;
      const bottomFullX = (width - bottomFullW) / 2;
      const bottomFullY = height * 0.763;
      const bottomFullH = 36;

      const embeddedSvgFontFace = embeddedFontDataUrl
        ? `@font-face { font-family: "VT323 Embedded"; src: url("${embeddedFontDataUrl}") format("woff2"); font-style: normal; font-weight: 400; }`
        : "";
      const svgStyle = `${embeddedSvgFontFace}
      .tc-text { font-family: "VT323 Embedded",monospace; font-weight: 700; }
      #content-layer { display: block; }
      #nosignal-layer { display: none; }
      @media (max-width: 1023px), (max-height: 767px) {
        #content-layer { display: none; }
        #nosignal-layer { display: block; }
      }`;

      const textNode = (content, x, y, fontSize) => {
        const safe = escapeXml(content);
        return `<text class="tc-text" x="${x}" y="${y}" fill="#ffffff" font-size="${fontSize}" text-anchor="middle" dominant-baseline="middle" transform="translate(${x},0) scale(1.5,1) translate(${-x},0)">${safe}</text>`;
      };

      const contentNodes = [
        `<image href="${EMBEDDED_PM5544_SVG_URL}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none"/>`
      ];

      if (render.topLarge) {
        contentNodes.push(`<rect x="${topBarX}" y="${topBarY}" width="${topBarWidth}" height="${topBarH}" fill="#000000"/>`);
        contentNodes.push(textNode(render.topLarge, width / 2, topBarY + (topBarH / 2), 40));
      } else if (render.top1 || render.top2) {
        contentNodes.push(`<rect x="${topBarX}" y="${topBarY}" width="${topBarWidth}" height="${topBarH}" fill="#000000"/>`);
        if (render.top1) {
          contentNodes.push(textNode(render.top1, width / 2, topSmallLine1Y, 20));
        }
        if (render.top2) {
          contentNodes.push(textNode(render.top2, width / 2, topSmallLine2Y, 20));
        }
      }

      if (render.bottomRight) {
        contentNodes.push(`<rect x="${bottomRightX}" y="${bottomRightY}" width="${bottomRightW}" height="${bottomRightH}" fill="#000000"/>`);
        contentNodes.push(textNode(render.bottomRight, bottomRightX + (bottomRightW / 2), bottomRightY + (bottomRightH / 2), 40));
      }
      if (render.bottomFull) {
        contentNodes.push(`<rect x="${bottomFullX}" y="${bottomFullY}" width="${bottomFullW}" height="${bottomFullH}" fill="#000000"/>`);
        contentNodes.push(textNode(render.bottomFull, width / 2, bottomFullY + (bottomFullH / 2), 40));
      }

      const noSignalFontSize = Math.max(84, Math.floor(width * 0.085));
      const nodes = [
        `<style>${svgStyle}</style>`,
        `<g id="content-layer">${contentNodes.join("\n")}</g>`,
        `<g id="nosignal-layer"><rect x="0" y="0" width="${width}" height="${height}" fill="#000000"/><text class="tc-text" x="${width / 2}" y="${height / 2}" fill="#ffffff" font-size="${noSignalFontSize}" text-anchor="middle" dominant-baseline="middle">NO SIGNAL</text></g>`
      ];

      return `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">\n${nodes.join("\n")}\n</svg>\n`;
    }

    function buildExportHtml(params, embeddedFontDataUrl = "") {
      const fixedParams = Object.fromEntries(params.entries());
      const scriptCloseTag = "</" + "script>";
      const embeddedFontFace = embeddedFontDataUrl
        ? `@font-face {\n      font-family: "VT323 Embedded";\n      src: url(${JSON.stringify(embeddedFontDataUrl)}) format("woff2");\n      font-style: normal;\n      font-weight: 400;\n      font-display: swap;\n    }`
        : "";

      return `<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM5544 Export</title>
  <style>
    ${embeddedFontFace}
    :root {
      --bg: #101010;
      --panel: #1b1b1b;
      --frame: #2a2a2a;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #2b2b2b 0%, var(--bg) 56%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: "VT323 Embedded", monospace;
    }
    .stage {
      background: linear-gradient(180deg, var(--panel), #101010);
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
      position: relative;
    }
    .viewport {
      position: relative;
      display: inline-block;
    }
    canvas {
      display: block;
      border: 2px solid var(--frame);
      background: #000;
    }
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .tc-bar {
      position: absolute;
      background: #000;
      text-align: center;
      margin: auto;
      left: 0;
      right: 0;
      display: none;
      color: #fff;
      line-height: 0.8;
      text-transform: uppercase;
      font-family: "VT323 Embedded", monospace;
    }
    .tc-bar p {
      margin: 0;
      font-size: 4.5vw;
      transform: scaleX(1.5);
      transform-origin: center;
      white-space: nowrap;
    }
    .tc-bar.top-large {
      width: 14%;
      top: 9.5%;
    }
    .tc-bar.top-small {
      width: 14%;
      top: 9.5%;
      line-height: 1;
    }
    .tc-bar.top-small p {
      font-size: 2.25vw;
    }
    .tc-bar.top-small p + p {
      margin-top: 0.2em;
    }
    .tc-bar.bottom-right {
      width: 19.2%;
      top: 76.7%;
      left: 2.2%;
      right: auto;
      margin: 0;
    }
    .tc-bar.bottom-full {
      width: 23.8%;
      top: 76.3%;
      padding: 0.3% 0;
    }
    @media (min-width: 900px) {
      .tc-bar p {
        font-size: 40px;
      }
      .tc-bar.top-small p {
        font-size: 20px;
      }
      .tc-bar.top-small p + p {
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="viewport">
      <canvas id="pm5544"></canvas>
      <div class="overlay" id="overlay">
        <div class="tc-bar top-large" id="tbarlarge"><p id="tbar"></p></div>
        <div class="tc-bar top-small" id="tbarsmall">
          <p id="tbar1"></p>
          <p id="tbar2"></p>
        </div>
        <div class="tc-bar bottom-right" id="bbar-right"><p id="bbar"></p></div>
        <div class="tc-bar bottom-full" id="bbar-full"><p id="bbarfull"></p></div>
      </div>
    </div>
  </div>
  <script>
    const MIN_WIDTH = 1024;
    const MIN_HEIGHT = 768;
    const ASPECT = 4 / 3;
    const CARD_DATA_URL = ${JSON.stringify(EMBEDDED_PM5544_SVG_URL)};
    const FIXED_PARAMS = ${JSON.stringify(fixedParams)};

    const stageElement = document.querySelector(".stage");
    const canvas = document.getElementById("pm5544");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const tbarLarge = document.getElementById("tbarlarge");
    const tbarSmall = document.getElementById("tbarsmall");
    const bbarRight = document.getElementById("bbar-right");
    const bbarFull = document.getElementById("bbar-full");
    const tbar = document.getElementById("tbar");
    const tbar1 = document.getElementById("tbar1");
    const tbar2 = document.getElementById("tbar2");
    const bbar = document.getElementById("bbar");
    const bbarfull = document.getElementById("bbarfull");

    const cardImage = new Image();
    let isCardReady = false;
    let hasCardError = false;

    const wkdays = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
    const mnths = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    const clockTargets = new Set();
    const dateTargets = new Set();
    let clockTimerId = null;
    let dateTimerId = null;

    function setBarVisible(element, visible) {
      element.style.display = visible ? "block" : "none";
    }

    function formatClock(now) {
      const s = String(now.getSeconds()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const h = String(now.getHours()).padStart(2, "0");
      return h + ":" + m + ":" + s;
    }

    function formatDate(now) {
      const w = wkdays[now.getDay()];
      const d = String(now.getDate()).padStart(2, "0");
      const m = mnths[now.getMonth()];
      return w + " " + d + " " + m;
    }

    function updateClockTargets() {
      const clockText = formatClock(new Date());
      clockTargets.forEach((el) => {
        el.textContent = clockText;
      });
    }

    function updateDateTargets() {
      const dateText = formatDate(new Date());
      dateTargets.forEach((el) => {
        el.textContent = dateText;
      });
    }

    function syncTimers() {
      if (clockTargets.size === 0 && clockTimerId !== null) {
        clearInterval(clockTimerId);
        clockTimerId = null;
      } else if (clockTargets.size > 0 && clockTimerId === null) {
        updateClockTargets();
        clockTimerId = setInterval(updateClockTargets, 1000);
      }

      if (dateTargets.size === 0 && dateTimerId !== null) {
        clearInterval(dateTimerId);
        dateTimerId = null;
      } else if (dateTargets.size > 0 && dateTimerId === null) {
        updateDateTargets();
        dateTimerId = setInterval(updateDateTargets, 1000);
      }
    }

    function bindBarValue(targetElement, rawValue) {
      const value = rawValue ?? "";
      const token = value.trim().toUpperCase();
      if (token === "TIME") {
        clockTargets.add(targetElement);
        return;
      }
      if (token === "DATE") {
        dateTargets.add(targetElement);
        return;
      }
      targetElement.textContent = value;
    }

    function resetBars() {
      setBarVisible(tbarLarge, false);
      setBarVisible(tbarSmall, false);
      setBarVisible(bbarRight, false);
      setBarVisible(bbarFull, false);
      [tbar, tbar1, tbar2, bbar, bbarfull].forEach((el) => {
        el.textContent = "";
        clockTargets.delete(el);
        dateTargets.delete(el);
      });
    }

    function applyFixedParams() {
      resetBars();
      if (FIXED_PARAMS.tbar) {
        setBarVisible(tbarLarge, true);
        bindBarValue(tbar, FIXED_PARAMS.tbar);
      } else {
        let hasTopSmall = false;
        if (FIXED_PARAMS.tbar1) {
          hasTopSmall = true;
          bindBarValue(tbar1, FIXED_PARAMS.tbar1);
        }
        if (FIXED_PARAMS.tbar2) {
          hasTopSmall = true;
          bindBarValue(tbar2, FIXED_PARAMS.tbar2);
        }
        setBarVisible(tbarSmall, hasTopSmall);
      }

      if (FIXED_PARAMS.bbar) {
        setBarVisible(bbarRight, true);
        bindBarValue(bbar, FIXED_PARAMS.bbar);
      }
      if (FIXED_PARAMS.bbarfull) {
        setBarVisible(bbarFull, true);
        bindBarValue(bbarfull, FIXED_PARAMS.bbarfull);
      }
      syncTimers();
    }

    function setOverlayVisible(visible) {
      overlay.style.display = visible ? "block" : "none";
    }

    function setCanvasSize(width, height) {
      const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      canvas.width = Math.max(1, Math.floor(width * dpr));
      canvas.height = Math.max(1, Math.floor(height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawNoSignal(width, height) {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#fff";
      ctx.font = "700 " + Math.max(28, Math.floor(width * 0.06)) + "px VT323 Embedded, monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("no signal", width / 2, height / 2);
    }

    function drawStatus(width, height, text) {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#ddd";
      ctx.font = "600 " + Math.max(20, Math.floor(width * 0.028)) + "px VT323 Embedded, monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, width / 2, height / 2);
    }

    function drawReferenceCard(width, height) {
      if (!isCardReady) {
        drawStatus(width, height, hasCardError ? "reference card failed to load" : "loading reference card...");
        return;
      }
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(cardImage, 0, 0, width, height);
    }

    function resizeAndRender() {
      const availableWidth = Math.max(320, window.innerWidth - 56);
      const availableHeight = Math.max(240, window.innerHeight - 56);
      let width = availableWidth;
      let height = Math.floor(width / ASPECT);
      if (height > availableHeight) {
        height = availableHeight;
        width = Math.floor(height * ASPECT);
      }
      setCanvasSize(width, height);

      if (width < MIN_WIDTH || height < MIN_HEIGHT) {
        setOverlayVisible(false);
        drawNoSignal(width, height);
        return;
      }

      setOverlayVisible(true);
      drawReferenceCard(width, height);
    }

    cardImage.onload = () => {
      isCardReady = true;
      hasCardError = false;
      resizeAndRender();
    };
    cardImage.onerror = () => {
      isCardReady = false;
      hasCardError = true;
      resizeAndRender();
    };
    cardImage.src = CARD_DATA_URL;

    applyFixedParams();
    window.addEventListener("resize", resizeAndRender);
    resizeAndRender();
  ${scriptCloseTag}
</body>
</html>
`;
    }

    function applyControlsToPreview(updateUrl) {
      const params = getParamsFromInputs();
      if (updateUrl) {
        updateUrlFromParams(params);
      }
      applyTextBarParams(params);
      resizeAndRender();
    }

    async function copyCurrentUrl() {
      const text = window.location.href;
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
    }

    function initControlPanel() {
      Object.values(paramInputs).forEach((input) => {
        input.addEventListener("input", () => {
          applyControlsToPreview(false);
        });
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            applyControlsToPreview(true);
          }
        });
      });

      btnApply.addEventListener("click", () => {
        applyControlsToPreview(true);
      });

      btnReset.addEventListener("click", () => {
        Object.values(paramInputs).forEach((input) => {
          input.value = "";
        });
        applyControlsToPreview(true);
      });

      btnCopyUrl.addEventListener("click", async () => {
        applyControlsToPreview(true);
        await copyCurrentUrl();
      });

      btnExportSvg.addEventListener("click", async () => {
        const params = getParamsFromInputs();
        const embeddedFontDataUrl = await getEmbeddedFontDataUrl();
        const svg = buildCustomSvg(params, embeddedFontDataUrl);
        downloadTextFile("PM5544_custom.svg", svg, "image/svg+xml;charset=utf-8");
      });

      btnExportHtml.addEventListener("click", async () => {
        const params = getParamsFromInputs();
        const embeddedFontDataUrl = await getEmbeddedFontDataUrl();
        const html = buildExportHtml(params, embeddedFontDataUrl);
        downloadTextFile("PM5544_custom.html", html, "text/html;charset=utf-8");
      });
    }

    function syncFromLocation() {
      const params = new URLSearchParams(window.location.search);
      setInputsFromParams(params);
      applyTextBarParams(params);
    }

    function setOverlayVisible(visible) {
      overlay.style.display = visible ? "block" : "none";
    }

    function getStageRenderBounds() {
      const fallback = {
        width: Math.max(320, window.innerWidth - 56),
        height: Math.max(240, window.innerHeight - 56)
      };

      if (!stageElement) {
        return fallback;
      }

      const rect = stageElement.getBoundingClientRect();
      const styles = window.getComputedStyle(stageElement);
      const padX = (parseFloat(styles.paddingLeft) || 0) + (parseFloat(styles.paddingRight) || 0);
      const padY = (parseFloat(styles.paddingTop) || 0) + (parseFloat(styles.paddingBottom) || 0);
      const borderX = (parseFloat(styles.borderLeftWidth) || 0) + (parseFloat(styles.borderRightWidth) || 0);
      const borderY = (parseFloat(styles.borderTopWidth) || 0) + (parseFloat(styles.borderBottomWidth) || 0);

      const width = Math.floor(rect.width - padX - borderX);
      const height = Math.floor(rect.height - padY - borderY);

      if (width < 100 || height < 100) {
        return fallback;
      }

      return {
        width: Math.max(320, width),
        height: Math.max(240, height)
      };
    }

    function setCanvasSize(width, height) {
      const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      canvas.width = Math.max(1, Math.floor(width * dpr));
      canvas.height = Math.max(1, Math.floor(height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = true;
      return { width, height };
    }

    function drawNoSignal(width, height) {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;
      for (let y = 0; y < height; y += 3) {
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(width, y + 0.5);
        ctx.stroke();
      }
      ctx.fillStyle = "#fff";
      ctx.font = `700 ${Math.max(28, Math.floor(width * 0.06))}px VT323 Embedded, monospace`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("no signal", width / 2, height / 2);
    }

    function drawCardStatus(width, height, text) {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#ddd";
      ctx.font = `600 ${Math.max(20, Math.floor(width * 0.028))}px VT323 Embedded, monospace`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, width / 2, height / 2);
    }

    function drawReferenceCard(width, height) {
      if (!isCardReady) {
        drawCardStatus(width, height, hasCardError ? "reference card failed to load" : "loading reference card...");
        return;
      }
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(cardImage, 0, 0, width, height);
    }

    function resizeAndRender() {
      const bounds = getStageRenderBounds();
      const availableWidth = bounds.width;
      const availableHeight = bounds.height;

      let width = availableWidth;
      let height = Math.floor(width / ASPECT);
      if (height > availableHeight) {
        height = availableHeight;
        width = Math.floor(height * ASPECT);
      }

      const size = setCanvasSize(width, height);
      if (size.width < MIN_WIDTH || size.height < MIN_HEIGHT) {
        setOverlayVisible(false);
        drawNoSignal(size.width, size.height);
        return;
      }

      setOverlayVisible(true);
      drawReferenceCard(size.width, size.height);
    }

    cardImage.onload = () => {
      isCardReady = true;
      hasCardError = false;
      resizeAndRender();
    };
    cardImage.onerror = () => {
      isCardReady = false;
      hasCardError = true;
      resizeAndRender();
    };
    cardImage.src = EMBEDDED_PM5544_SVG_URL;

    initControlPanel();
    syncFromLocation();
    window.addEventListener("popstate", () => {
      syncFromLocation();
      resizeAndRender();
    });
    window.addEventListener("resize", resizeAndRender);
    resizeAndRender();
  </script>
</body>
</html>
